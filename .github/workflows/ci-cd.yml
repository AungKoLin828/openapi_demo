name: Spring Boot CI (Gradle Advanced)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK 17 + Gradle cache
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      # 3️⃣ Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4️⃣ Build project (compile only)
      - name: Build Project
        run: ./gradlew clean assemble --no-daemon

      # 5️⃣ Run tests
      - name: Run Tests
        run: ./gradlew test --no-daemon

      # 6️⃣ Generate JaCoCo Coverage Report
      - name: Generate Coverage Report
        run: ./gradlew jacocoTestReport --no-daemon

      # 7️⃣ Upload Test Results
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/

      # 8️⃣ Upload Coverage Report
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/

      # 9️⃣ Upload JAR Artifact
      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: build/libs/*.jar
