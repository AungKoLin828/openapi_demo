name: Spring Boot CI (Gradle)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle # Built-in Gradle caching

      # 3️⃣ Grant execute permission for gradlew
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4️⃣ Build & Run Tests
      - name: Build and Test
        run: ./gradlew clean build
